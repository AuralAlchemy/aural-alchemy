<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop PoC · Aural Alchemy</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Jost:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c18; --cyan: #4dd9c0; --gold: #c9a84c;
    --text: #c8d0e0; --dim: #5a6278;
    --glass: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Jost', sans-serif; font-weight: 300;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 36px 20px 60px; gap: 24px;
  }
  header { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .logo { width: 46px; height: 46px; }
  h1 {
    font-family: 'Cinzel', serif; font-size: 1.05rem; font-weight: 400;
    letter-spacing: 0.25em;
    background: linear-gradient(90deg, var(--cyan), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; }
  .card {
    background: var(--glass); border: 1px solid var(--border);
    border-radius: 12px; padding: 22px 26px; width: 100%; max-width: 560px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .card-title { font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.2em; color: var(--gold); }
  .themes { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
  .theme-btn {
    background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 4px; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 4px; transition: all 0.18s; color: var(--dim);
    font-family: 'Jost', sans-serif; font-size: 0.66rem; letter-spacing: 0.04em;
  }
  .theme-btn:hover { border-color: var(--cyan); color: var(--text); }
  .theme-btn.active { border-color: var(--cyan); background: rgba(77,217,192,0.07); color: var(--cyan); }
  .theme-icon { font-size: 1.2rem; }

  /* Mode toggle */
  .mode-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mode-btn {
    padding: 10px 8px; border: 1px solid var(--border); border-radius: 8px;
    background: rgba(0,0,0,0.3); color: var(--dim); cursor: pointer;
    font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.06em; transition: all 0.18s; text-align: center;
  }
  .mode-btn:hover { border-color: var(--gold); color: var(--text); }
  .mode-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.1); color: var(--gold); }

  .dur-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .dur-chip {
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px;
    background: rgba(0,0,0,0.3); color: var(--dim); cursor: pointer;
    font-family: 'Share Tech Mono', monospace; font-size: 0.72rem;
    letter-spacing: 0.06em; transition: all 0.18s;
  }
  .dur-chip:hover { border-color: var(--gold); color: var(--text); }
  .dur-chip.active { border-color: var(--gold); background: rgba(201,168,76,0.1); color: var(--gold); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn {
    padding: 12px; border-radius: 8px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.18em;
    text-transform: uppercase; transition: all 0.2s; border: 1px solid;
  }
  .btn-start { background: linear-gradient(135deg, rgba(77,217,192,0.15), rgba(201,168,76,0.08)); border-color: var(--cyan); color: var(--cyan); }
  .btn-start:hover { background: rgba(77,217,192,0.22); }
  .btn-start:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-stop { background: rgba(201,168,76,0.08); border-color: var(--gold); color: var(--gold); display: none; }
  .btn-stop:hover { background: rgba(201,168,76,0.18); }
  .preview-wrap { width: 100%; max-width: 560px; display: none; flex-direction: column; gap: 10px; }
  .preview-wrap.visible { display: flex; }
  .stage {
    position: relative; width: 100%; aspect-ratio: 16/9;
    border-radius: 10px; overflow: hidden; background: #000;
    border: 1px solid var(--border);
  }
  #display { width: 100%; height: 100%; display: block; }
  /* hidden video for frame source */
  #srcVid { display: none; }
  .hud {
    position: absolute; z-index: 4;
    background: rgba(8,12,24,0.82); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 9px; pointer-events: none;
    font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; letter-spacing: 0.09em;
  }
  .hud-tl { top:10px; left:12px; color:var(--gold); border-color:rgba(201,168,76,0.3); }
  .hud-tr { top:10px; right:12px; color:var(--cyan); }
  .hud-bl { bottom:10px; left:12px; color:var(--dim); font-size:0.58rem; }
  .hud-br { bottom:10px; right:12px; color:var(--cyan); }
  .progress-track {
    width: 100%; height: 6px; background: var(--border); border-radius: 3px;
    position: relative; cursor: pointer; transition: height 0.15s;
  }
  .progress-track:hover { height: 9px; }
  .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--cyan),var(--gold)); border-radius:3px; pointer-events:none; }
  .pg-thumb {
    position:absolute; top:50%; left:0%; transform:translate(-50%,-50%);
    width:14px; height:14px; border-radius:50%;
    background:#fff; border:2px solid var(--cyan);
    pointer-events:none; opacity:0; transition:opacity 0.15s;
  }
  .progress-track:hover .pg-thumb { opacity:1; }
  .info-row { display:flex; justify-content:space-between; font-family:'Share Tech Mono',monospace; font-size:0.67rem; color:var(--dim); }
  .ok{color:var(--cyan);} .warn{color:var(--gold);}
  .log {
    width:100%; max-width:560px; background:rgba(0,0,0,0.28);
    border:1px solid var(--border); border-radius:8px;
    padding:12px 15px; font-family:'Share Tech Mono',monospace;
    font-size:0.66rem; color:var(--dim); line-height:1.75;
    max-height:140px; overflow-y:auto; display:none;
  }
  .log.on { display:block; }
  .lc{color:var(--cyan);} .lg{color:var(--gold);} .lt{color:var(--text);}
</style>
</head>
<body>

<header>
  <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4dd9c0"/><stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient></defs>
    <circle cx="50" cy="50" r="46" stroke="url(#g)" stroke-width="1.4" fill="none"/>
    <polygon points="50,4 6.7,73 93.3,73" stroke="url(#g)" stroke-width="1.4" fill="none"/>
  </svg>
  <h1>LOOP VALIDATOR</h1>
  <p class="sub">aural alchemy · seamless loop poc</p>
</header>

<div class="card">
  <span class="card-title">01 · Theme</span>
  <div class="themes">
    <button class="theme-btn active"
      data-cf="waterfall close up static mist"
      data-pend="forest path drone flythrough slow">🌿<br>Nature</button>
    <button class="theme-btn"
      data-cf="stars night sky milky way static"
      data-pend="star timelapse sky rotation long exposure">🌌<br>Galaxy</button>
    <button class="theme-btn"
      data-cf="calm ocean shore waves breaking static"
      data-pend="aerial coastline drone ocean sunset">🌊<br>Ocean</button>
    <button class="theme-btn"
      data-cf="rain drops window glass close up"
      data-pend="sunset timelapse clouds moving sky">🌧<br>Rain</button>
    <button class="theme-btn"
      data-cf="fire flame candle close up static"
      data-pend="lava flow slow motion volcanic">🔥<br>Fire</button>
  </div>
</div>

<div class="card">
  <span class="card-title">02 · Loop Mode</span>
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="crossfade">↺ Crossfade loop<br><small style="opacity:0.6">restarts from beginning</small></button>
    <button class="mode-btn" data-mode="pendulum">⇄ Pendulum / reverse<br><small style="opacity:0.6">forward → reverse → forward</small></button>
  </div>

  <div>
    <label style="font-size:0.75rem;letter-spacing:0.07em;color:var(--dim);display:flex;justify-content:space-between;margin-bottom:8px;">
      <span>Playback speed</span>
      <span id="speedVal" style="color:var(--cyan);font-family:'Share Tech Mono',monospace;">0.5x</span>
    </label>
    <input type="range" id="speedSlider" min="0.1" max="1.0" step="0.05" value="0.5"
      style="width:100%;accent-color:var(--cyan);cursor:pointer;"
      oninput="document.getElementById('speedVal').textContent=parseFloat(this.value).toFixed(2)+'x'">
    <div style="display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--dim);margin-top:4px;">
      <span>0.1x ultra slow</span><span>0.5x cinematic</span><span>1.0x normal</span>
    </div>
  </div>

  <div class="dur-chips">
    <button class="dur-chip active" data-secs="30">30s</button>
    <button class="dur-chip" data-secs="60">1 min</button>
    <button class="dur-chip" data-secs="180">3 min</button>
    <button class="dur-chip" data-secs="600">10 min</button>
    <button class="dur-chip" data-secs="1800">30 min</button>
    <button class="dur-chip" data-secs="3600">1 hr</button>
  </div>

  <div class="row2">
    <button class="btn btn-start" id="btnStart" onclick="startSession()">▶ START</button>
    <button class="btn btn-stop"  id="btnStop"  onclick="stopSession()">■ STOP</button>
  </div>
  <button class="btn" id="btnTry" onclick="tryAnother()"
    style="display:none;border-color:var(--dim);color:var(--dim);padding:10px;">
    ↻ TRY ANOTHER CLIP
  </button>
</div>

<div class="preview-wrap" id="preview">
  <div class="stage">
    <!-- Single hidden video as frame source; canvas renders it -->
    <video id="srcVid" playsinline muted crossorigin="anonymous"></video>
    <canvas id="display"></canvas>
    <div class="hud hud-tl" id="hudDir">▶ FWD</div>
    <div class="hud hud-tr" id="hudLoop">LOOP 1</div>
    <div class="hud hud-bl" id="hudClip"></div>
    <div class="hud hud-br" id="hudTime">0:00</div>
  </div>
  <div class="progress-track" id="pgTrack">
    <div class="progress-fill" id="pgFill"></div>
    <div class="pg-thumb" id="pgThumb"></div>
  </div>
  <div class="info-row">
    <span id="infoL">—</span>
    <span id="infoR">—</span>
  </div>
</div>

<div class="log" id="log"></div>

<script>
const PROXY   = 'https://white-cloud-27a9.nanomarche.workers.dev';
const CF_MS   = 4000;  // 4s crossfade
let   SPEED   = 0.5;   // controlled by slider

// ── State ─────────────────────────────────────────────────────────────────────
let queryCF   = 'waterfall close up static mist';
let queryPend = 'forest path drone flythrough slow';
let loopMode  = 'crossfade';
let targetSecs = 30;
let running    = false;
let loopN      = 0;
let elapsed    = 0;
let sessionStart = 0;
let tickTimer  = null;
let animId     = null;
let clipDur    = 0;

// Pendulum state
let pendPos    = 0;     // current position in clip (seconds)
let pendDir    = 1;     // 1 = forward, -1 = reverse
let lastFrame  = 0;     // performance.now() of last rAF

// Crossfade state (uses two <video> elements)
let vA, vB, activeVid, standbyVid, cfTimer;

const canvas  = document.getElementById('display');
const ctx     = canvas.getContext('2d');
const srcVid  = document.getElementById('srcVid');

// ── UI ────────────────────────────────────────────────────────────────────────
document.querySelectorAll('.theme-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.theme-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  queryCF   = b.dataset.cf;
  queryPend = b.dataset.pend;
}));
document.querySelectorAll('.dur-chip').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.dur-chip').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); targetSecs = parseInt(b.dataset.secs);
}));
document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); loopMode = b.dataset.mode;
}));

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
function lg(msg, cls='lt') {
  const el = document.getElementById('log');
  el.classList.add('on');
  const d = document.createElement('div');
  d.className = cls; d.textContent = '› '+msg;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function setProgress(frac) {
  const pct = Math.min(frac*100,100)+'%';
  document.getElementById('pgFill').style.width = pct;
  document.getElementById('pgThumb').style.left = pct;
}

// ── Clip pool — keeps fetched results so "try another" doesn't re-hit API ────
let clipPool  = [];   // all candidates from last fetch
let clipIndex = 0;    // which one we're currently on

async function fetchClipPool(q) {
  // Random page 1-5 so repeat users get different results each time
  const page = Math.floor(Math.random() * 5) + 1;
  lg(`fetching page ${page} for "${q}"...`);
  const res = await fetch(`${PROXY}?query=${encodeURIComponent(q)}&per_page=15&orientation=landscape&page=${page}`);
  if (!res.ok) throw new Error(`worker ${res.status}`);
  const data = await res.json();
  if (!data.videos?.length) throw new Error('no results');

  const scored = data.videos.map(v => {
    const files = v.video_files || [];
    const file = files.find(f => f.width >= 1280 && f.width <= 1920)
               || files.find(f => f.width >= 960)
               || files[0];
    if (!file) return null;
    const durScore = (v.duration >= 20 && v.duration <= 40) ? 4
                   : (v.duration > 40 && v.duration <= 60)  ? 2
                   : (v.duration >= 10)                     ? 1 : 0;
    const resScore = file.width >= 1280 ? 1 : 0;
    return { url: file.link, duration: v.duration, w: file.width, h: file.height, score: durScore + resScore };
  }).filter(Boolean);

  // Shuffle within same score tier so order varies each run
  scored.sort((a,b) => b.score - a.score + (Math.random() - 0.5) * 0.5);

  clipPool  = scored;
  clipIndex = 0;
  lg(`got ${scored.length} candidates`, 'lt');
  return clipPool[0];
}

function nextClip() {
  clipIndex = (clipIndex + 1) % clipPool.length;
  return clipPool[clipIndex];
}

// ── START ─────────────────────────────────────────────────────────────────────
async function startSession(clip = null) {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').style.display = 'block';
  document.getElementById('btnTry').style.display = 'none';
  document.getElementById('preview').classList.add('visible');
  document.getElementById('log').innerHTML = '';
  running = true; loopN = 1; elapsed = 0;
  setProgress(0);

  if (!clip) {
    const q = loopMode === 'pendulum' ? queryPend : queryCF;
    try {
      clip = await fetchClipPool(q);
    } catch(e) {
      lg(`error: ${e.message}`, 'lg');
      stopSession(); return;
    }
  }

  SPEED = parseFloat(document.getElementById('speedSlider').value);
  lg(`clip ${clip.duration}s · ${clip.w}×${clip.h} · speed ${SPEED}x · mode ${loopMode}`, 'lc');
  document.getElementById('hudClip').textContent = `${clip.duration}s`;
  document.getElementById('infoR').textContent = `${clip.duration}s · ${SPEED}x · ${fmt(targetSecs)} target`;

  if (loopMode === 'pendulum') {
    startPendulum(clip);
  } else {
    startCrossfade(clip);
  }
}

async function tryAnother() {
  stopSession();
  await new Promise(r => setTimeout(r, 300));
  const q = loopMode === 'pendulum' ? queryPend : queryCF;
  const clip = clipPool.length > 1 ? nextClip() : await fetchClipPool(q);
  lg(`trying clip ${clipIndex + 1}/${clipPool.length}`, 'lt');
  startSession(clip);
}

// ════════════════════════════════════════════════════════════════════════════════
// PENDULUM MODE
// Real fix: play forward at slow playbackRate using native video playback.
// For the reverse pass: we use requestVideoFrameCallback to draw frames to canvas,
// and manually seek backward each frame — but only if the browser can keep up.
// Fallback: just slow forward loop with crossfade if seeking is too slow.
// ════════════════════════════════════════════════════════════════════════════════
async function startPendulum(clip) {
  canvas.width  = 960;
  canvas.height = Math.round(960 * clip.h / clip.w);
  canvas.style.display = 'block';

  srcVid.src = clip.url;
  srcVid.load();

  await new Promise((res, rej) => {
    srcVid.oncanplay = res;
    srcVid.onerror   = () => rej(new Error('video load failed'));
  });

  clipDur   = srcVid.duration && isFinite(srcVid.duration) ? srcVid.duration : clip.duration;
  pendPos   = 0;
  pendDir   = 1;
  lastFrame = performance.now();

  lg(`pendulum ready · ${clipDur.toFixed(1)}s · ${SLOW}x speed`, 'lc');
  lg(`each pass ~${(clipDur/SLOW).toFixed(0)}s`, 'lt');

  // Use slow forward playback via playbackRate — this is smooth and native
  srcVid.playbackRate = SLOW;
  srcVid.currentTime  = 0;
  srcVid.play();

  document.getElementById('hudDir').textContent  = '▶ FWD';
  document.getElementById('hudLoop').textContent = '▶';

  sessionStart = performance.now();
  startTick();

  // Use requestVideoFrameCallback if available (Chrome) for per-frame canvas draw
  // Fallback to rAF
  if (srcVid.requestVideoFrameCallback) {
    lg('using requestVideoFrameCallback (smooth)', 'lt');
    function onFrame(now, meta) {
      if (!running) return;
      ctx.drawImage(srcVid, 0, 0, canvas.width, canvas.height);

      // Check if we've hit the end — then reverse
      if (srcVid.currentTime >= clipDur - 0.15) {
        handleReverse();
      } else if (srcVid.currentTime <= 0.05 && pendDir === -1) {
        handleForward();
      }
      srcVid.requestVideoFrameCallback(onFrame);
    }
    srcVid.requestVideoFrameCallback(onFrame);
  } else {
    // rAF fallback — draw whatever frame the video is on
    lg('using rAF fallback', 'lt');
    function rafDraw() {
      if (!running) return;
      ctx.drawImage(srcVid, 0, 0, canvas.width, canvas.height);
      if (srcVid.currentTime >= clipDur - 0.2) handleReverse();
      animId = requestAnimationFrame(rafDraw);
    }
    animId = requestAnimationFrame(rafDraw);
  }
}

// For reverse: we seek manually backward each rAF — works on shorter clips
// For long clips browser decode is too slow, so we just loop with crossfade
let reverseAnimId = null;

function handleReverse() {
  pendDir = -1; loopN++;
  document.getElementById('hudDir').textContent  = '◀ REV';
  document.getElementById('hudLoop').textContent = `◀ ×${loopN}`;
  lg(`↩ reversing at ${srcVid.currentTime.toFixed(1)}s`, 'lc');

  srcVid.pause();
  // Seek backward manually — step size tuned for smooth playback
  const STEP = SLOW * (1/30); // ~one frame worth at SLOW speed
  let pos = srcVid.currentTime;

  cancelAnimationFrame(reverseAnimId);
  function reverseStep(now) {
    if (!running) return;
    pos = Math.max(0, pos - STEP * 1.5); // slightly faster steps to catch up
    srcVid.currentTime = pos;

    const drawAndContinue = () => {
      ctx.drawImage(srcVid, 0, 0, canvas.width, canvas.height);
      if (pos <= 0.05) {
        handleForward();
      } else {
        reverseAnimId = requestAnimationFrame(reverseStep);
      }
    };

    // Wait for seek to complete before drawing
    if (Math.abs(srcVid.currentTime - pos) < 0.5) {
      drawAndContinue();
    } else {
      srcVid.onseeked = () => { srcVid.onseeked = null; drawAndContinue(); };
    }
  }
  reverseAnimId = requestAnimationFrame(reverseStep);
}

function handleForward() {
  pendDir = 1; loopN++;
  document.getElementById('hudDir').textContent  = '▶ FWD';
  document.getElementById('hudLoop').textContent = `▶ ×${loopN}`;
  lg(`↪ forward · ${fmt(elapsed)}`, 'lc');
  cancelAnimationFrame(reverseAnimId);
  srcVid.currentTime = 0;
  srcVid.play();
}

// Draw video frame to canvas on seeked (used as fallback)
srcVid.addEventListener('seeked', () => {
  if (!running || loopMode !== 'pendulum' || pendDir === 1) return;
  ctx.drawImage(srcVid, 0, 0, canvas.width, canvas.height);
});

// ════════════════════════════════════════════════════════════════════════════════
// CROSSFADE MODE
// Both videos play the same clip at SPEED (slow-mo).
// Timeline per loop:
//   0 ─────────────────── (clipDur*1000/SPEED - CF_MS) ── CF_MS ── done
//   active plays slow                                    crossfade  standby becomes active
//                                                                   standby resets to 0
// Key: standby starts from currentTime=0 ALWAYS.
// Both are playing slow-mo so the clip feels long (20s clip = 40s at 0.5x).
// ════════════════════════════════════════════════════════════════════════════════
async function startCrossfade(clip) {
  canvas.style.display = 'none';

  const stage = document.querySelector('.stage');
  stage.querySelectorAll('video.cf-vid').forEach(v => v.remove());

  vA = makeVid(); vB = makeVid();
  stage.insertBefore(vB, stage.firstChild);
  stage.insertBefore(vA, stage.firstChild);

  function makeVid() {
    const v = document.createElement('video');
    v.className = 'cf-vid';
    v.setAttribute('playsinline', ''); v.muted = true;
    v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:none;';
    return v;
  }

  const url = clip.url;
  vA.src = url; vB.src = url;

  // Wait for both to be ready
  await Promise.all([
    new Promise((res,rej) => { vA.oncanplaythrough=res; vA.onerror=rej; vA.load(); }),
    new Promise((res,rej) => { vB.oncanplaythrough=res; vB.onerror=rej; vB.load(); }),
  ]);

  clipDur = (vA.duration && isFinite(vA.duration)) ? vA.duration : clip.duration;
  // Effective clip duration at slow speed
  const effectiveDur = clipDur / SPEED;
  lg(`clip ${clipDur.toFixed(1)}s · at ${SPEED}x = ${effectiveDur.toFixed(0)}s effective · cf ${CF_MS/1000}s`, 'lc');

  if (effectiveDur < CF_MS/1000 * 2) {
    lg('clip too short for smooth crossfade at this speed — fetching might give better results', 'lg');
  }

  // Start vA playing slow
  vA.playbackRate = SPEED;
  vA.currentTime  = 0;
  vA.play();
  vA.style.opacity = '1';
  vA.style.zIndex  = '2';

  // Preload vB at start, not playing yet
  vB.playbackRate = SPEED;
  vB.currentTime  = 0;
  vB.style.zIndex = '1';

  activeVid  = vA;
  standbyVid = vB;

  document.getElementById('hudLoop').textContent = 'LOOP 1';
  document.getElementById('hudDir').textContent  = `${SPEED}x`;
  document.getElementById('hudClip').textContent = `${clipDur.toFixed(0)}s → ${effectiveDur.toFixed(0)}s`;
  sessionStart = performance.now();

  startTick();
  scheduleCF();
}

function scheduleCF() {
  if (!running) return;
  clearTimeout(cfTimer);

  // How long until we should START the crossfade:
  // We want to crossfade CF_MS before the active video naturally ends at SPEED.
  // Active video's remaining real time = (clipDur - activeVid.currentTime) / SPEED * 1000
  // We start CF that many ms before the end, minus CF_MS.
  const remaining = ((clipDur - (activeVid ? activeVid.currentTime : 0)) / SPEED * 1000) - CF_MS;
  const delay = Math.max(remaining, 500);

  lg(`next loop in ${(delay/1000).toFixed(1)}s`, 'lt');
  cfTimer = setTimeout(doCF, delay);
}

function doCF() {
  if (!running) return;

  loopN++;
  document.getElementById('hudLoop').textContent = `LOOP ${loopN}`;
  lg(`✦ loop ${loopN} · ${fmt(elapsed)}`, 'lc');

  const out = activeVid;
  const inn = standbyVid;

  // Standby starts from 0, playing at SPEED — fresh loop
  inn.currentTime  = 0;
  inn.playbackRate = SPEED;
  inn.play();
  inn.style.zIndex    = '3'; // on top
  inn.style.transition = 'none';
  inn.style.opacity    = '0';

  // Force reflow then fade in
  inn.getBoundingClientRect();
  inn.style.transition = `opacity ${CF_MS}ms ease-in-out`;
  inn.style.opacity    = '1';

  // After fade completes: outgoing stops, becomes standby
  setTimeout(() => {
    out.pause();
    out.currentTime  = 0;
    out.style.transition = 'none';
    out.style.opacity    = '0';
    out.style.zIndex     = '2';
    inn.style.zIndex     = '2';

    activeVid  = inn;
    standbyVid = out;

    scheduleCF(); // schedule next loop from current position
  }, CF_MS + 200);
}

// ── Seek ──────────────────────────────────────────────────────────────────────
function seekTo(frac) {
  if (!running || !clipDur) return;
  const seekSecs = Math.max(0, Math.min(frac * targetSecs, targetSecs - 0.1));
  sessionStart   = performance.now() - seekSecs * 1000;
  elapsed        = seekSecs;
  setProgress(frac);

  if (loopMode === 'pendulum') {
    // Map session time to pendulum position
    const totalTravel = clipDur / SLOW;
    const cycleT      = seekSecs % (totalTravel * 2);
    pendPos = cycleT < totalTravel ? cycleT * SLOW : clipDur - (cycleT - totalTravel) * SLOW;
    pendPos = Math.max(0, Math.min(clipDur, pendPos));
    pendDir = cycleT < totalTravel ? 1 : -1;
  } else {
    const sceneOffset = seekSecs % clipDur;
    if (activeVid) { activeVid.currentTime = sceneOffset; if (activeVid.paused) activeVid.play(); }
    clearTimeout(cfTimer); scheduleCF();
  }
  lg(`⏩ ${fmt(seekSecs)}`, 'lg');
}

(function() {
  const track = document.getElementById('pgTrack');
  let drag = false;
  const frac = e => { const r=track.getBoundingClientRect(), x=e.touches?e.touches[0].clientX:e.clientX; return Math.max(0,Math.min(1,(x-r.left)/r.width)); };
  track.addEventListener('mousedown', e => { if(running){drag=true;seekTo(frac(e));} });
  window.addEventListener('mousemove', e => { if(drag)seekTo(frac(e)); });
  window.addEventListener('mouseup', ()=>{ drag=false; });
  track.addEventListener('touchstart', e=>{if(running){drag=true;seekTo(frac(e));}},{passive:true});
  window.addEventListener('touchmove', e=>{if(drag)seekTo(frac(e));},{passive:true});
  window.addEventListener('touchend', ()=>{drag=false;});
})();

// ── Tick ──────────────────────────────────────────────────────────────────────
function startTick() {
  clearInterval(tickTimer);
  tickTimer = setInterval(() => {
    if (!running) { clearInterval(tickTimer); return; }
    elapsed = (performance.now() - sessionStart) / 1000;
    setProgress(elapsed / targetSecs);
    document.getElementById('hudTime').textContent = fmt(elapsed);
    document.getElementById('infoL').innerHTML = `<span class="ok">${fmt(elapsed)}</span> / ${fmt(targetSecs)}`;
    if (elapsed >= targetSecs) { lg('target reached', 'lc'); stopSession(); }
  }, 400);
}

// ── Stop ──────────────────────────────────────────────────────────────────────
function stopSession() {
  running = false;
  cancelAnimationFrame(animId);
  if (typeof reverseAnimId !== 'undefined') cancelAnimationFrame(reverseAnimId);
  clearTimeout(cfTimer);
  clearInterval(tickTimer);
  srcVid.pause();
  if (vA) vA.pause(); if (vB) vB.pause();
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').style.display = 'none';
  if (clipPool.length > 0) document.getElementById('btnTry').style.display = 'block';
  lg(`stopped · ${fmt(elapsed)} · ${loopN} loop(s)`, 'lg');
}
</script>
</body>
