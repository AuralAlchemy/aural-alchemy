<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0d1618"/>
      <stop offset="100%" stop-color="#080e10"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(45,212,191,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <rect width="1200" height="630" fill="url(#leftGlow)"/>

  <!-- Subtle top teal glow -->
  <ellipse cx="600" cy="-20" rx="600" ry="200" fill="rgba(45,212,191,0.05)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="rgba(30,48,53,0.8)" stroke-width="1"/>

  <!-- Left decorative line -->
  <line x1="440" y1="0" x2="440" y2="630" stroke="rgba(30,48,53,0.4)" stroke-width="1"/>

  <!-- Alchemical symbol — left panel, perfectly centered -->
  <!-- Circle circumradius 130, center (200, 315) -->
  <circle cx="200" cy="315" r="130" stroke="url(#logoGrad)" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#glow)"/>
  <!-- Perfect equilateral triangle: top(200,185) BL(87.4,380) BR(312.6,380) -->
  <polygon points="200,185 87.4,380 312.6,380" stroke="url(#logoGrad)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <!-- Crossbar at y=315: x=124.9 to 275.1 -->
  <line x1="124.9" y1="315" x2="275.1" y2="315" stroke="url(#logoGrad)" stroke-width="2" filter="url(#glow)"/>
  <!-- Center dot -->
  <circle cx="200" cy="315" r="5" fill="#2dd4bf" opacity="0.9"/>
  <!-- Outer faint circle -->
  <circle cx="200" cy="315" r="155" stroke="#2dd4bf" stroke-width="0.5" fill="none" opacity="0.15"/>

  <!-- Right panel content -->
  <!-- Brand eyebrow -->
  <text x="490" y="220"
    font-family="'Courier New', monospace"
    font-size="16"
    letter-spacing="8"
    fill="rgba(90,122,120,0.8)"
    text-transform="uppercase">AURAL ALCHEMY</text>

  <!-- Main title — three lines -->
  <text x="490" y="300"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82"
    font-weight="700"
    letter-spacing="3"
    fill="url(#titleGrad)"
    filter="url(#glow)">SOUND.</text>

  <text x="490" y="390"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82"
    font-weight="700"
    letter-spacing="3"
    fill="url(#titleGrad)"
    filter="url(#glow)">VIBRATION.</text>

  <text x="490" y="480"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82"
    font-weight="700"
    letter-spacing="3"
    fill="url(#titleGrad)"
    filter="url(#glow)">TRANSCENDENCE.</text>

  <!-- Tagline -->
  <text x="490" y="540"
    font-family="'Courier New', monospace"
    font-size="14"
    letter-spacing="4"
    fill="rgba(90,122,120,0.65)">HEALING FREQUENCIES · MIDI TOOLS · AMBIENT MUSIC</text>

  <!-- URL -->
  <text x="490" y="590"
    font-family="'Courier New', monospace"
    font-size="16"
    letter-spacing="3"
    fill="rgba(45,212,191,0.4)">alchemyaural.com</text>

  <!-- Decorative wave lines bottom right -->
  <g opacity="0.18">
    <path d="M700,600 Q800,585 900,600 Q1000,615 1100,600 Q1150,592 1190,600" stroke="#2dd4bf" stroke-width="1.5" fill="none"/>
    <path d="M700,612 Q800,597 900,612 Q1000,627 1100,612 Q1150,604 1190,612" stroke="#d4a843" stroke-width="1" fill="none"/>
  </g>
</svg>
